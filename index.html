<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>代替薬ナビ｜同種同効薬・代替提案</title>
<style>
  :root{
    --ink:#1a2238;
    --ink-soft:#3d4663;
    --paper:#f7f5ef;
    --card:#ffffff;
    --line:#d9d4c7;
    --accent:#9c2a2a;
    --same:#1f6f5c;
    --similar:#b3801f;
    --shadow:0 1px 0 rgba(26,34,56,.04), 0 8px 24px -16px rgba(26,34,56,.35);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Hiragino Mincho ProN","Yu Mincho",serif;background:var(--paper);
    color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased}
  .wrap{max-width:920px;margin:0 auto;padding:28px 20px 80px}

  header{border-bottom:2px solid var(--ink);padding-bottom:18px;margin-bottom:22px}
  .eyebrow{font-size:.72rem;letter-spacing:.32em;color:var(--accent);font-weight:700;
    font-family:"Hiragino Kaku Gothic ProN",sans-serif}
  h1{font-size:1.9rem;letter-spacing:.04em;margin:6px 0 4px;font-weight:600}
  .sub{font-size:.86rem;color:var(--ink-soft);font-family:"Hiragino Kaku Gothic ProN",sans-serif}

  .search-row{display:flex;gap:10px;margin:20px 0 14px;flex-wrap:wrap}
  #q{flex:1;min-width:220px;font-size:1rem;padding:12px 14px;border:1.5px solid var(--line);
    background:var(--card);border-radius:2px;color:var(--ink);
    font-family:"Hiragino Kaku Gothic ProN",sans-serif}
  #q:focus{outline:none;border-color:var(--accent)}

  .tree{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
  .chip{font-family:"Hiragino Kaku Gothic ProN",sans-serif;font-size:.78rem;padding:6px 13px;
    border:1.2px solid var(--line);background:var(--card);border-radius:100px;cursor:pointer;
    color:var(--ink-soft);transition:.15s;white-space:nowrap}
  .chip:hover{border-color:var(--ink-soft)}
  .chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}

  .count{font-family:"Hiragino Kaku Gothic ProN",sans-serif;font-size:.76rem;
    color:var(--ink-soft);margin:18px 2px 8px}

  .group{margin-bottom:30px}
  .group-head{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;
    border-bottom:1px solid var(--line);padding-bottom:6px;margin-bottom:12px}
  .group-name{font-size:1.15rem;font-weight:600;letter-spacing:.03em}
  .group-moa{font-family:"Hiragino Kaku Gothic ProN",sans-serif;font-size:.74rem;
    color:var(--accent);font-weight:700}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px}
  .card{background:var(--card);border:1px solid var(--line);border-left:3px solid var(--ink-soft);
    border-radius:2px;padding:9px 12px;box-shadow:var(--shadow);cursor:pointer;
    transition:.15s;text-align:left;width:100%;font-family:inherit;color:inherit}
  .card:hover{border-left-color:var(--accent);transform:translateY(-1px);
    box-shadow:0 1px 0 rgba(26,34,56,.04), 0 12px 28px -16px rgba(26,34,56,.45)}
  .card:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .card .cue{font-family:"Hiragino Kaku Gothic ProN",sans-serif;font-size:.66rem;
    color:var(--accent);margin-top:6px;opacity:0;transition:.15s}
  .card:hover .cue,.card:focus-visible .cue{opacity:1}

  .ingredient{font-size:1rem;font-weight:600;letter-spacing:.02em;line-height:1.35}
  .cat-label{font-family:"Hiragino Kaku Gothic ProN",sans-serif;font-size:.64rem;
    color:var(--accent);letter-spacing:.03em;margin-top:1px}
  .name-row{padding-bottom:6px;margin-bottom:6px;border-bottom:1px dotted var(--line)}

  .products{list-style:none}
  .products li{display:flex;align-items:baseline;gap:7px;padding:2px 0;
    font-family:"Hiragino Kaku Gothic ProN",sans-serif;font-size:.8rem}
  .kind{flex:none;font-size:.62rem;font-weight:700;padding:1px 6px;border-radius:3px;letter-spacing:.03em}
  .kind.brand{background:#f3efe5;color:var(--similar)}
  .pname{color:var(--ink)}

  .empty{font-family:"Hiragino Kaku Gothic ProN",sans-serif;color:var(--ink-soft);
    padding:30px 0;text-align:center;font-size:.9rem}

  .back{font-family:"Hiragino Kaku Gothic ProN",sans-serif;font-size:.82rem;
    background:none;border:none;color:var(--accent);cursor:pointer;padding:6px 0;
    margin-bottom:14px;display:inline-flex;align-items:center;gap:6px}
  .back:hover{text-decoration:underline}
  .back:focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:2px}

  .selected{background:var(--ink);color:#fff;border-radius:3px;padding:16px 18px;margin-bottom:8px}
  .selected .lead{font-family:"Hiragino Kaku Gothic ProN",sans-serif;font-size:.7rem;
    letter-spacing:.2em;opacity:.7}
  .selected .sel-name{font-size:1.4rem;font-weight:600;margin-top:4px;letter-spacing:.03em}
  .selected .sel-meta{font-family:"Hiragino Kaku Gothic ProN",sans-serif;font-size:.76rem;
    opacity:.85;margin-top:4px}
  .selected .sel-products{font-family:"Hiragino Kaku Gothic ProN",sans-serif;font-size:.76rem;
    opacity:.85;margin-top:6px}

  .alt-head{font-family:"Hiragino Kaku Gothic ProN",sans-serif;font-size:.8rem;
    color:var(--ink-soft);margin:20px 2px 12px;font-weight:700;letter-spacing:.05em}
  .alt-head .moa{color:var(--accent);font-weight:700}

  .caution{background:#f6ebe9;border-left:3px solid var(--accent);border-radius:2px;
    padding:10px 13px;margin:16px 0;font-family:"Hiragino Kaku Gothic ProN",sans-serif;
    font-size:.74rem;color:var(--ink-soft);line-height:1.7}
  .caution b{color:var(--accent)}

  footer{margin-top:50px;border-top:1px solid var(--line);padding-top:14px;
    font-family:"Hiragino Kaku Gothic ProN",sans-serif;font-size:.72rem;color:var(--ink-soft)}
  footer b{color:var(--accent)}
</style>
</head>

<div class="wrap">
  <header>
    <div class="eyebrow">同種同効薬 ・ 代替提案ナビ</div>
    <h1>代替薬ナビ</h1>
    <div class="sub">薬効分類から同種同効薬をたどり、代替候補を成分単位で素早く確認</div>
  </header>

  <div id="browse">
    <div class="search-row">
      <input id="q" type="text" placeholder="薬剤名・一般名で検索（例：タケキャブ、アムロジピン）" autocomplete="off">
    </div>
    <div class="count" id="count"></div>
    <div id="results"></div>
  </div>

  <div id="detail" style="display:none"></div>

  <footer>
    <b>注意</b>　本ツールは薬効分類に基づく代替候補の参照を目的とした参考情報です。実際の変更可否・用量換算（力価）・適応・相互作用は最新の添付文書・ガイドライン・処方医への確認に基づき判断してください。
  </footer>
</div>

// 各グループ内を五十音順（kana）でソート
GROUPS.forEach(g=>g.ingredients.sort((a,b)=>a.kana.localeCompare(b.kana,"ja")));

let activeGroup = "all";
let query = "";

const resultsEl = document.getElementById("results");
const countEl = document.getElementById("count");
const qEl = document.getElementById("q");
const browseEl = document.getElementById("browse");
const detailEl = document.getElementById("detail");

function matchesQuery(ing){
  if(!query) return true;
  const q = query.toLowerCase();
  if(ing.name.toLowerCase().includes(q)) return true;
  return ing.products.some(p=>p.name.toLowerCase().includes(q));
}

function brandProducts(ing){ return ing.products.filter(p=>p.kind==="brand"); }
function productsLine(ing){ return brandProducts(ing).map(p=>`先発：${p.name}`).join("／"); }

function ingredientCardInner(ing, catLabel){
  return `<div class="name-row">
      <div class="ingredient">${ing.name}</div>
      ${catLabel?`<div class="cat-label">${catLabel}</div>`:""}
    </div>
    <ul class="products">
      ${brandProducts(ing).map(p=>`<li>
        <span class="kind brand">先発</span><span class="pname">${p.name}</span>
      </li>`).join("")}
    </ul>`;
}

function shortCat(name){
  // チップ用の短い分類名（カードに添えるラベル）
  return name.replace(/（.*?）/g,"").replace(/^降圧薬：/,"").replace(/^経口糖尿病薬：/,"");
}

function render(){
  let html = "", total = 0;

  if(activeGroup === "all"){
    // 全成分を五十音順でフラット表示
    const flat = [];
    GROUPS.forEach(g=>{
      g.ingredients.forEach(ing=>{
        if(matchesQuery(ing)) flat.push({ing, group:g});
      });
    });
    flat.sort((a,b)=>a.ing.kana.localeCompare(b.ing.kana,"ja"));
    total = flat.length;
    if(total>0){
      html = `<div class="grid">` + flat.map(({ing,group})=>
        `<button class="card" data-group="${group.id}" data-ing="${ing.name}"
            aria-label="${ing.name}の代替候補を見る">
          ${ingredientCardInner(ing, shortCat(group.name))}
          <div class="cue">→ この成分の代替候補を見る</div>
        </button>`
      ).join("") + `</div>`;
    }
  }else{
    // 特定分類：見出し+作用機序つき
    const g = GROUPS.find(x=>x.id===activeGroup);
    const ings = g.ingredients.filter(matchesQuery);
    total = ings.length;
    if(total>0){
      html = `<div class="group">
        <div class="group-head">
          <span class="group-name">${g.name}</span>
          <span class="group-moa">作用機序：${g.moa}</span>
        </div>
        <div class="grid">` +
        ings.map(ing=>
          `<button class="card" data-group="${g.id}" data-ing="${ing.name}"
              aria-label="${ing.name}の代替候補を見る">
            ${ingredientCardInner(ing)}
            <div class="cue">→ この成分の代替候補を見る</div>
          </button>`
        ).join("") + `</div></div>`;
    }
  }

  if(total===0){
    resultsEl.innerHTML = `<div class="empty">該当する薬剤が見つかりません。検索語または分類を変更してください。</div>`;
    countEl.textContent = "";
  }else{
    resultsEl.innerHTML = html;
    countEl.textContent = `${total} 成分の候補`;
    resultsEl.querySelectorAll(".card").forEach(c=>{
      c.addEventListener("click",()=>showDetail(c.dataset.group, c.dataset.ing));
    });
  }
}

function showDetail(groupId, ingName){
  const group = GROUPS.find(g=>g.id===groupId);
  const sel = group.ingredients.find(i=>i.name===ingName);
  const alts = group.ingredients.filter(i=>i.name!==ingName); // 既に五十音順

  let altHtml;
  if(alts.length===0){
    altHtml = `<div class="empty">同分類内に他の代替成分が登録されていません。<br>別の薬効分類・上位の治療目標に基づく検討が必要です。</div>`;
  }else{
    altHtml = `<div class="grid">` + alts.map(ing=>
      `<div class="card" style="cursor:default">${ingredientCardInner(ing)}</div>`
    ).join("") + `</div>`;
  }

  detailEl.innerHTML = `
    <button class="back" id="backBtn" aria-label="一覧に戻る">← 一覧に戻る</button>
    <div class="selected">
      <div class="lead">この成分が使えないとき</div>
      <div class="sel-name">${sel.name}</div>
      <div class="sel-meta">${group.name}</div>
      <div class="sel-products">${productsLine(sel)}</div>
    </div>
    <div class="alt-head">同分類の代替候補（五十音順）　<span class="moa">作用機序：${group.moa}</span></div>
    ${altHtml}
    <div class="caution">
      <b>代替時の確認事項</b>　同種同効でも力価（用量換算）・適応症・保険査定・相互作用・剤形（嚥下/簡易懸濁）は成分ごとに異なります。切替の可否と用量は必ず添付文書・ガイドライン・処方医への確認のうえ判断してください。
    </div>`;

  browseEl.style.display = "none";
  detailEl.style.display = "block";
  const back = document.getElementById("backBtn");
  back.addEventListener("click", showBrowse);
  back.focus();
  window.scrollTo({top:0, behavior:"smooth"});
  document.addEventListener("keydown", escHandler);
}

function showBrowse(){
  detailEl.style.display = "none";
  browseEl.style.display = "block";
  document.removeEventListener("keydown", escHandler);
}
function escHandler(e){ if(e.key==="Escape") showBrowse(); }

qEl.addEventListener("input", e=>{ query = e.target.value.trim(); render(); });

render();
</script>
